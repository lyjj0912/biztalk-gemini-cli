<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BizTalk — 업무 말투 변환기</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header><h1>💼 업무 말투 변환기</h1></header>
        <main>
            <textarea id="inputText" placeholder="내용을 입력하세요..."></textarea>
            <div class="target-buttons">
                <button class="target-btn active" data-target="boss">상사</button>
                <button class="target-btn" data-target="colleague">동료</button>
                <button class="target-btn" data-target="client">고객</button>
                <button class="target-btn" data-target="team">팀원</button>
            </div>
            <button id="convertBtn">변환하기</button>
            <div class="output-container">
                <textarea id="outputText" readonly></textarea>
                <div id="loadingOverlay" class="hidden">변환 중...</div>
            </div>
            <button id="copyBtn">복사하기</button>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
